###############################################################
# grafana/provisioning/datasources/prometheus.yml
# Auto-provisions Prometheus as a data source on first start
###############################################################
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: GET
