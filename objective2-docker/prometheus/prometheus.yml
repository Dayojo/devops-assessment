global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics

  - job_name: "devops-app"
    scrape_interval: 15s
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
